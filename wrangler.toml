name = "personal-blog"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/client"

[vars]
CF_ACCESS_TEAM_NAME = "holy-night-66db"
GITHUB_REPO = "romanenkostud/romanenkostud"
NEWSLETTER_FROM = "newsletter@pavloromanenko.com"
# RESEND_API_KEY is a secret, sourced from the GitHub Actions secret of the same
# name and pushed to the Worker on each deploy (see .github/workflows/deploy.yml).
# Without it, confirmation/notification emails are logged to the console instead of sent.

[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "0899d432-b5ff-4c0e-b89f-f69a927bb150"

[[kv_namespaces]]
binding = "SESSION"
id = "0d1e4fa8c8d240039f87a4c295261aec"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "blog-media"
