services:
  blog:
    build: .
    ports:
      - "4321:4321"
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      - STRAPI_URL=http://strapi:1337
      - STRAPI_TOKEN=${STRAPI_TOKEN}
      - USE_MOCK_DATA=${USE_MOCK_DATA:-false}
    depends_on:
      strapi:
        condition: service_healthy
    restart: unless-stopped

  strapi:
    image: strapi/strapi:latest
    ports:
      - "1337:1337"
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: strapi
      DATABASE_USERNAME: ${DB_USER:-strapi}
      DATABASE_PASSWORD: ${DB_PASSWORD:-strapi}
      APP_KEYS: ${STRAPI_APP_KEYS:-key1,key2,key3,key4}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:-tokensalt}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:-adminjwt}
      JWT_SECRET: ${STRAPI_JWT_SECRET:-jwtsecret}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: ${DB_USER:-strapi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strapi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - blog
    restart: unless-stopped

volumes:
  postgres-data:
  strapi-uploads:
