name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure npm libc
        run: echo "libc=glibc" >> ~/.npmrc

      - run: npm ci

      - run: npm run build

      - name: Run D1 migrations
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply blog-db --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            RESEND_API_KEY
            GH_PROFILE_TOKEN
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_PROFILE_TOKEN: ${{ secrets.GH_PROFILE_TOKEN }}
